<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="موسوعة الأسئلة والأجوبة العربية">
<title>موسوعة الأسئلة والأجوبة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===========================
     CSS VARIABLES & RESET
  =========================== */
  :root {
    --bg-primary: #0d0f14;
    --bg-secondary: #13161e;
    --bg-card: #1a1e2a;
    --bg-card-hover: #1f2434;
    --bg-glass: rgba(26, 30, 42, 0.85);
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(99, 179, 237, 0.4);
    --accent: #63b3ed;
    --accent-warm: #f6ad55;
    --accent-green: #68d391;
    --text-primary: #e8eaf0;
    --text-secondary: #8892a4;
    --text-muted: #555e6e;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.22s ease;

    /* Category colors */
    --cat-دين: #a78bfa;
    --cat-جغرافيا: #34d399;
    --cat-السعودية: #60a5fa;
    --cat-منوعات: #f97316;
    --cat-أكلات: #fb7185;
    --cat-كرة-قدم: #facc15;
    --cat-شركات: #38bdf8;
    --cat-لغات: #a3e635;
    --cat-مدن: #f472b6;
    --cat-تراث: #fb923c;
    --cat-إلكترونيات: #22d3ee;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth;
    font-size: 16px;
  }

  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Tajawal', 'Cairo', sans-serif;
    min-height: 100vh;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ===========================
     BACKGROUND TEXTURE
  =========================== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(99, 179, 237, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167, 139, 250, 0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===========================
     STICKY HEADER
  =========================== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 15, 20, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0 10px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 500px;
  }

  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 38px 10px 16px;
    color: var(--text-primary);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    direction: rtl;
  }

  #searchInput:focus {
    border-color: var(--border-active);
    box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.1);
  }

  #searchInput::placeholder { color: var(--text-muted); }

  .stats-bar {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 0 0 8px;
    max-width: 1100px;
    margin: 0 auto;
  }

  #resultCount { color: var(--accent); font-weight: 600; }

  /* ===========================
     TOPIC FILTER TABS
  =========================== */
  .topics-wrap {
    background: rgba(13, 15, 20, 0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 97px;
    z-index: 90;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .topics-wrap::-webkit-scrollbar { display: none; }

  .topics-inner {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    max-width: 1100px;
    margin: 0 auto;
    min-width: max-content;
  }

  .topic-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    direction: rtl;
  }

  .topic-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.6;
  }

  .topic-btn:hover {
    background: var(--bg-card);
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.15);
  }

  .topic-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
    border-color: var(--border-active);
    box-shadow: 0 0 12px rgba(99, 179, 237, 0.15);
  }

  /* ===========================
     MAIN LAYOUT
  =========================== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ===========================
     LETTER SECTIONS
  =========================== */
  .letter-section {
    margin-bottom: 32px;
  }

  .letter-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    position: sticky;
    top: 145px;
    z-index: 80;
    padding: 6px 0;
  }

  .letter-badge {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(99,179,237,0.15), rgba(167,139,250,0.1));
    border: 1px solid rgba(99,179,237,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .letter-label {
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-secondary);
    flex: 1;
  }

  .letter-count {
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--bg-card);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ===========================
     QUESTION CARDS GRID
  =========================== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  /* ===========================
     QA CARD
  =========================== */
  .qa-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    cursor: pointer;
    will-change: transform;
  }

  .qa-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.12);
    box-shadow: var(--shadow);
  }

  .qa-card.open {
    border-color: var(--border-active);
    box-shadow: 0 0 20px rgba(99,179,237,0.08);
  }

  .card-question {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 14px 12px;
  }

  .card-q-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: rgba(99,179,237,0.12);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
    font-family: 'Cairo', sans-serif;
  }

  .card-q-text {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .card-toggle {
    color: var(--text-muted);
    font-size: 0.7rem;
    flex-shrink: 0;
    margin-top: 4px;
    transition: transform var(--transition), color var(--transition);
  }

  .qa-card.open .card-toggle {
    transform: rotate(180deg);
    color: var(--accent);
  }

  .card-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.25s ease;
    opacity: 0;
  }

  .qa-card.open .card-answer {
    max-height: 200px;
    opacity: 1;
  }

  .card-answer-inner {
    padding: 0 14px 14px 14px;
    border-top: 1px solid var(--border);
    margin: 0 14px;
    padding-top: 10px;
  }

  .answer-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .answer-text {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent-warm);
    font-family: 'Cairo', sans-serif;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 12px;
  }

  .category-tag {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 12px;
    border: 1px solid currentColor;
    opacity: 0.75;
  }

  /* ===========================
     EMPTY STATE
  =========================== */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* ===========================
     JUMP NAV (alphabet sidebar)
  =========================== */
  .jump-nav {
    position: fixed;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--bg-glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 4px;
  }

  .jump-btn {
    width: 26px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .jump-btn:hover {
    background: rgba(99,179,237,0.15);
    color: var(--accent);
  }

  /* ===========================
     RESPONSIVE
  =========================== */
  @media (max-width: 768px) {
    .logo span { display: none; }
    .letter-header { top: 135px; }
    .topics-wrap { top: 85px; }
    .cards-grid { grid-template-columns: 1fr; }
    .jump-nav { display: none; }
    .header-top { gap: 8px; }
  }

  @media (max-width: 480px) {
    .topics-wrap { top: 83px; }
    header { padding: 0 12px; }
    main { padding: 16px 12px 60px; }
  }

  /* ===========================
     ANIMATIONS
  =========================== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .letter-section {
    animation: fadeUp 0.4s ease both;
  }

  .qa-card {
    animation: fadeUp 0.35s ease both;
  }

  /* ===========================
     SCROLLBAR
  =========================== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }
</style>
</head>
<body>

<!-- ========================
     HEADER
======================== -->
<header role="banner">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span>موسوعة الأسئلة</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="searchInput"
        placeholder="ابحث في الأسئلة والأجوبة..."
        aria-label="بحث في الأسئلة"
        autocomplete="off"
      />
    </div>
  </div>
  <div class="stats-bar" aria-live="polite">
    عرض <span id="resultCount">0</span> سؤال

</header>

<!-- ========================
     TOPIC FILTER TABS
======================== -->
<nav class="topics-wrap" aria-label="تصفية حسب الموضوع">
  <div class="topics-inner" id="topicsContainer">

  </div>
</nav>

<!-- ========================
     JUMP NAV
======================== -->
<nav class="jump-nav" aria-label="التنقل بين الحروف" id="jumpNav">
  <!-- Injected by JS -->

<!-- ========================
     MAIN CONTENT
======================== -->
<main id="mainContent" role="main">
  <div id="questionsContainer"></div>

    <div class="empty-icon">🔎</div>
    <div class="empty-title">لا توجد نتائج</div>
    <div class="empty-sub">جرب كلمات بحث مختلفة أو تصنيفًا آخر</div>
  </div>
</main>

    const color = cat === 'الكل' ? 'var(--accent)' : (CAT_COLORS[cat] || '#888');
    const icon = cat === 'الكل' ? '📋' : (CAT_ICONS[cat] || '•');
    return `<button
      class="topic-btn ${cat === activeCategory ? 'active' : ''}"
      data-cat="${cat}"
      style="--cat-color:${color}"
      aria-pressed="${cat === activeCategory}"
    >
      <span>${icon}</span>
      ${cat}
    </button>`;
  }).join('');
}

function buildJumpNav() {
  const nav = document.getElementById('jumpNav');
  nav.innerHTML = ARABIC_LETTER_ORDER.map(l =>
    `<a class="jump-btn" href="#letter-${l}" aria-label="انتقل إلى حرف ${l}">${l}</a>`
  ).join('');
}

/* ================================================
   FILTER DATA
================================================ */
function getFiltered() {
  const q = searchQuery.trim().toLowerCase();
  return DATA.filter(item => {
    const catMatch = activeCategory === 'الكل' || item.cat === activeCategory;
    if (!catMatch) return false;
    if (!q) return true;
    return item.q.includes(q) || item.a.toLowerCase().includes(q) || item.cat.includes(q);
  });
}

/* ================================================
   RENDER
================================================ */
function render() {
  const filtered = getFiltered();
  const container = document.getElementById('questionsContainer');
  const emptyState = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  countEl.textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '';
    emptyState.classList.add('visible');
    return;
  }

  emptyState.classList.remove('visible');

  // Group by letter
  const grouped = {};
  filtered.forEach(item => {
    if (!grouped[item.letter]) grouped[item.letter] = [];
    grouped[item.letter].push(item);
  });

  // Sort letters in Arabic order
  const sortedLetters = ARABIC_LETTER_ORDER.filter(l => grouped[l]);

  container.innerHTML = sortedLetters.map((letter, si) => {
    const items = grouped[letter];
    const cards = items.map((item, idx) => buildCard(item, `${letter}-${idx}`, (si * 20 + idx) * 30)).join('');
    return `
      <section class="letter-section" id="letter-${letter}" aria-labelledby="lh-${letter}" style="animation-delay:${si * 40}ms">
        <div class="letter-header">
          <div class="letter-badge" aria-hidden="true">${letter}</div>
          <span class="letter-label" id="lh-${letter}">حرف ${letter}</span>
          <span class="letter-count">${items.length} سؤال</span>
        </div>
        <div class="cards-grid">${cards}</div>
      </section>
    `;
  }).join('');

  // Re-attach card events
  bindCardEvents();
}

function buildCard(item, id, delay) {
  const color = CAT_COLORS[item.cat] || '#888';
  const isOpen = openCards.has(id);
  return `
    <article
      class="qa-card ${isOpen ? 'open' : ''}"
      data-id="${id}"
      aria-expanded="${isOpen}"
      role="button"
      tabindex="0"
      style="animation-delay:${delay}ms"
    >
      <div class="card-question">
        <div class="card-q-icon" aria-hidden="true">س</div>
        <div class="card-q-text">${escapeHtml(item.q)}</div>
        <div class="card-toggle" aria-hidden="true">▼</div>
      </div>
      <div class="card-answer" aria-hidden="${!isOpen}">
        <div class="card-answer-inner">
          <div class="answer-label">الإجابة</div>
          <div class="answer-text">${escapeHtml(item.a)}</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="category-tag" style="color:${color};border-color:${color}">
          ${CAT_ICONS[item.cat] || ''} ${item.cat}
        </span>
      </div>
    </article>
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ================================================
   EVENT BINDING
================================================ */
function bindEvents() {
  // Search
  const searchInput = document.getElementById('searchInput');
  let searchTimeout;
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value;
      openCards.clear();
      render();
    }, 250);
  });

  // Topics
  document.getElementById('topicsContainer').addEventListener('click', e => {
    const btn = e.target.closest('.topic-btn');
    if (!btn) return;
    activeCategory = btn.dataset.cat;
    openCards.clear();

    // Update active state
    document.querySelectorAll('.topic-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === activeCategory);
      b.setAttribute('aria-pressed', b.dataset.cat === activeCategory);
    });

    render();
  });
}

function bindCardEvents() {
  document.querySelectorAll('.qa-card').forEach(card => {
    card.addEventListener('click', () => toggleCard(card));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleCard(card);
      }
    });
  });
}

function toggleCard(card) {
  const id = card.dataset.id;
  const isOpen = card.classList.contains('open');

  if (isOpen) {
    openCards.delete(id);
    card.classList.remove('open');
    card.setAttribute('aria-expanded', 'false');
    card.querySelector('.card-answer').setAttribute('aria-hidden', 'true');
  } else {
    openCards.add(id);
    card.classList.add('open');
    card.setAttribute('aria-expanded', 'true');
    card.querySelector('.card-answer').setAttribute('aria-hidden', 'false');
  }
}

// Boot
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
